<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medula City — Asistente</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a0a2e;
      color: #f0e6ff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #app {
      width: 100%;
      max-width: 760px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: #2a1040;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px #0008;
    }

    header {
      background: #3d1a60;
      padding: 16px 24px;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 1px;
      color: #e0b0ff;
      border-bottom: 1px solid #5a2a80;
    }

    #mensajes {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .burbuja {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    .burbuja.usuario {
      align-self: flex-end;
      background: #6a2fa0;
      color: #fff;
      border-bottom-right-radius: 2px;
    }

    .burbuja.asistente {
      align-self: flex-start;
      background: #3a1a58;
      color: #e8d5ff;
      border-bottom-left-radius: 2px;
    }

    .burbuja.herramienta {
      align-self: flex-start;
      background: #1a2a1a;
      color: #80ff80;
      font-size: 0.8rem;
      font-family: monospace;
      padding: 6px 12px;
      border-radius: 8px;
    }

    #entrada {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid #5a2a80;
      background: #2a1040;
    }

    #input-texto {
      flex: 1;
      background: #1a0a2e;
      border: 1px solid #5a2a80;
      border-radius: 8px;
      padding: 10px 14px;
      color: #f0e6ff;
      font-size: 0.95rem;
      outline: none;
      resize: none;
      height: 44px;
    }

    #input-texto:focus { border-color: #a060e0; }

    #btn-enviar {
      background: #7a30c0;
      border: none;
      border-radius: 8px;
      color: white;
      padding: 0 20px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    #btn-enviar:hover { background: #9a50e0; }
    #btn-enviar:disabled { background: #3a2060; cursor: not-allowed; }

    /* Modal de confirmación */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #0009;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.visible { display: flex; }

    #modal {
      background: #2a1040;
      border: 1px solid #7a30c0;
      border-radius: 16px;
      width: 90%;
      max-width: 700px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #modal-header {
      background: #3d1a60;
      padding: 14px 20px;
      font-weight: bold;
      color: #e0b0ff;
      font-size: 0.95rem;
    }

    #modal-descripcion {
      padding: 12px 20px;
      color: #c0a0e0;
      font-size: 0.9rem;
      border-bottom: 1px solid #5a2a80;
    }

    #modal-codigo {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      font-family: monospace;
      font-size: 0.85rem;
      background: #1a0a2e;
      color: #c8e6c9;
      white-space: pre;
    }

    #modal-botones {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid #5a2a80;
    }

    #btn-confirmar {
      flex: 1;
      background: #2e7d32;
      border: none;
      border-radius: 8px;
      color: white;
      padding: 10px;
      font-size: 1rem;
      cursor: pointer;
    }

    #btn-confirmar:hover { background: #43a047; }

    #btn-cancelar {
      flex: 1;
      background: #7a1a1a;
      border: none;
      border-radius: 8px;
      color: white;
      padding: 10px;
      font-size: 1rem;
      cursor: pointer;
    }

    #btn-cancelar:hover { background: #c62828; }
  </style>
</head>
<body>
  <div id="app">
    <header>🎮 Medula City — Asistente de desarrollo</header>
    <div id="mensajes">
      <div class="burbuja asistente">¡Hola! Soy tu asistente de Medula City. Puedo leer, analizar y proponer cambios al código del proyecto. ¿En qué te ayudo?</div>
    </div>
    <div id="entrada">
      <textarea id="input-texto" placeholder="Escribe tu tarea..." rows="1"></textarea>
      <button id="btn-enviar">▶</button>
    </div>
  </div>

  <!-- Modal de confirmación -->
  <div id="modal-overlay">
    <div id="modal">
      <div id="modal-header">📝 El asistente quiere guardar un archivo</div>
      <div id="modal-descripcion"></div>
      <div id="modal-codigo"></div>
      <div id="modal-botones">
        <button id="btn-confirmar">✅ Confirmar y guardar</button>
        <button id="btn-cancelar">❌ Cancelar</button>
      </div>
    </div>
  </div>

  <script>
    const mensajesEl = document.getElementById('mensajes')
    const inputEl = document.getElementById('input-texto')
    const btnEl = document.getElementById('btn-enviar')
    const modalOverlay = document.getElementById('modal-overlay')
    const modalDescripcion = document.getElementById('modal-descripcion')
    const modalCodigo = document.getElementById('modal-codigo')
    const btnConfirmar = document.getElementById('btn-confirmar')
    const btnCancelar = document.getElementById('btn-cancelar')

    let historial = []
    let propuestaPendiente = null

    function agregarBurbuja(texto, tipo) {
      const div = document.createElement('div')
      div.className = `burbuja ${tipo}`
      div.textContent = texto
      mensajesEl.appendChild(div)
      mensajesEl.scrollTop = mensajesEl.scrollHeight
      return div
    }

    function mostrarModal(datos) {
      propuestaPendiente = datos
      modalDescripcion.textContent = `📄 ${datos.ruta}  —  ${datos.descripcion}`
      modalCodigo.textContent = datos.contenido
      modalOverlay.classList.add('visible')
    }

    function cerrarModal() {
      modalOverlay.classList.remove('visible')
      propuestaPendiente = null
    }

    btnCancelar.addEventListener('click', () => {
      agregarBurbuja(`❌ Guardado cancelado: ${propuestaPendiente?.ruta}`, 'herramienta')
      cerrarModal()
    })

    btnConfirmar.addEventListener('click', async () => {
      const datos = propuestaPendiente
      cerrarModal()

      const res = await fetch('/confirmar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ruta: datos.ruta, contenido: datos.contenido })
      })

      const json = await res.json()
      if (json.ok) {
        agregarBurbuja(`✅ Guardado: ${datos.ruta}`, 'herramienta')
      } else {
        agregarBurbuja(`❌ Error de sintaxis en ${datos.ruta}:\n${json.error}`, 'herramienta')
      }
    })

    async function enviar() {
      const texto = inputEl.value.trim()
      if (!texto) return

      agregarBurbuja(texto, 'usuario')
      inputEl.value = ''
      btnEl.disabled = true

      const burbuja = agregarBurbuja('', 'asistente')

      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensaje: texto, historial })
      })

      const reader = res.body.getReader()
      const decoder = new TextDecoder()

      while (true) {
        const { done, value } = await reader.read()
        if (done) break

        const lineas = decoder.decode(value).split('\n')
        for (const linea of lineas) {
          if (!linea.startsWith('data: ')) continue
          const datos = JSON.parse(linea.slice(6))

          if (datos.tipo === 'herramienta') {
            agregarBurbuja(`🔧 Usando: ${datos.nombre}...`, 'herramienta')
          } else if (datos.tipo === 'propuesta') {
            agregarBurbuja(`📝 Propuesta lista: ${datos.datos.ruta}`, 'herramienta')
            mostrarModal(datos.datos)
          } else if (datos.tipo === 'texto') {
            burbuja.textContent += datos.contenido
            mensajesEl.scrollTop = mensajesEl.scrollHeight
          } else if (datos.tipo === 'fin') {
            historial = datos.historial
          }
        }
      }

      btnEl.disabled = false
      inputEl.focus()
    }

    btnEl.addEventListener('click', enviar)
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        enviar()
      }
    })
  </script>
</body>
</html>
